{% extends "core/base.html" %}

{% block title %}Delete Course{% endblock %}

{% block content %}
<div class="max-w-md mx-auto space-y-8 py-4 animate-fade-in">
    
    <div class="pb-6 border-b border-zinc-900">
        <span class="text-[10px] font-mono uppercase tracking-widest text-zinc-500 block mb-1">Destructive Action</span>
        <h1 class="text-xl font-medium tracking-tight text-zinc-100">Delete Course</h1>
    </div>

    <div class="bg-zinc-900/10 border border-zinc-900 rounded-lg p-6 sm:p-8 space-y-6 transition-all duration-300 hover:border-zinc-800/60">
        <p class="text-xs text-zinc-400 leading-relaxed">
            Are you sure you want to delete <strong class="text-zinc-100 font-medium font-mono bg-zinc-900 px-1.5 py-0.5 rounded border border-zinc-800">{{ course.title }}</strong>? This will permanently remove the syllabus module.
        </p>

        <form method="POST" class="flex items-center justify-end gap-4 pt-2">
            {% csrf_token %}
            
            <a href="{% url 'courses' %}" class="text-xs font-mono text-zinc-500 hover:text-zinc-300 transition-colors duration-150">
                Cancel
            </a>
            
            <button type="submit" class="text-xs font-medium bg-zinc-900 hover:bg-zinc-800 text-red-400 hover:text-red-300 border border-zinc-800 hover:border-zinc-700 px-4 py-2 rounded transition-all duration-150 active:scale-[0.98]">
                Yes, Delete
            </button>
        </form>
    </div>
</div>

<style>
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(4px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
        animation: fadeIn 250ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
</style>
{% endblock %}
