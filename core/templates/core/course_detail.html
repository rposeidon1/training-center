{% extends "core/base.html" %}

{% block title %}About Course{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto space-y-8 animate-fade-in">
    
    <div class="pb-6 border-b border-zinc-900 flex items-center justify-between">
        <div>
            <span class="text-[10px] font-mono uppercase tracking-widest text-zinc-500 block mb-1">Module Overview</span>
            <h1 class="text-xl font-medium tracking-tight text-zinc-100">About Course</h1>
        </div>
        
        <a href="{% url 'courses' %}" class="text-xs font-mono text-zinc-500 hover:text-zinc-300 transition-colors duration-150">
            &larr; Back to catalog
        </a>
    </div>

    <div class="group bg-zinc-900/10 border border-zinc-900 rounded-lg p-6 sm:p-8 space-y-6 transition-all duration-300 hover:border-zinc-800 hover:bg-zinc-900/30">
        
        <div class="flex flex-col sm:flex-row sm:items-start justify-between gap-4">
            <div class="space-y-1">
                <span class="text-[9px] font-mono uppercase tracking-wider text-zinc-600 block">Course Title</span>
                <h2 class="text-lg font-medium text-zinc-200 group-hover:text-zinc-100 transition-colors duration-200">
                    {{ course.title }}
                </h2>
            </div>
            
            <div class="flex flex-col sm:items-end">
                <span class="text-[9px] font-mono uppercase tracking-wider text-zinc-600 block mb-1">Term Length</span>
                <span class="text-xs font-mono text-zinc-400 bg-zinc-900 px-3 py-1 rounded border border-zinc-800 transition-all duration-300 group-hover:border-zinc-700 group-hover:text-zinc-300">
                    {{ course.duration }}
                </span>
            </div>
        </div>

        <hr class="border-zinc-900 transition-colors duration-300 group-hover:border-zinc-800">

        <div class="space-y-1">
            <span class="text-[9px] font-mono uppercase tracking-wider text-zinc-600 block">Syllabus Details</span>
            <p class="text-xs text-zinc-400 leading-relaxed font-normal group-hover:text-zinc-300 transition-colors duration-200">
                {{ course.description }}
            </p>
        </div>

    </div>
</div>

<style>
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(4px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
        animation: fadeIn 350ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
</style>
{% endblock %}
