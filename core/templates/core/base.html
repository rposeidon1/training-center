<!DOCTYPE html>
<html lang="en" class="h-full bg-zinc-950 text-zinc-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Training Centre Student Portal{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-full flex flex-col font-sans antialiased selection:bg-zinc-800 selection:text-zinc-200">

    <header class="border-b border-zinc-900 bg-zinc-900/40 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="h-2 w-2 rounded-full bg-zinc-500"></span>
                <span class="text-xs uppercase font-medium tracking-widest text-zinc-400">Portal</span>
            </div>
            
            <div>
                <form method="POST" action="{% url 'logout' %}" class="m-0">
                    {% csrf_token %}
                    <button type="submit" class="text-xs font-medium text-zinc-400 hover:text-zinc-200 border border-zinc-800 bg-zinc-900/60 px-3 py-1.5 rounded transition-all duration-200 ease-in-out hover:border-zinc-700">
                        Logout
                    </button>
                </form>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-6xl w-full mx-auto px-6 py-10">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
